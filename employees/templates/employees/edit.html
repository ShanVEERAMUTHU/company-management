{% extends 'employees/base.html' %}
{% block page_title %}Edit Employee{% endblock %}

{% block content %}
<div class="form-card">
    <div class="card">
        <div class="card-header">Edit - {{ employee.name }}</div>
        <div class="card-body">
            <div style="text-align:center;margin-bottom:20px;">
                {% if employee.photo %}
                    <img src="{{ employee.photo.url }}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #eef0fd;">
                    <p style="font-size:12px;color:#999;margin-top:6px;">Current photo</p>
                {% else %}
                    <div style="width:90px;height:90px;border-radius:50%;background:#eef0fd;color:#4361ee;font-size:32px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto;">{{ employee.name|first|upper }}</div>
                    <p style="font-size:12px;color:#999;margin-top:6px;">No photo</p>
                {% endif %}
            </div>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" value="{{ employee.Emp_id }}" disabled style="background:#f8f9fa;">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" value="{{ employee.name }}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ employee.email }}" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" value="{{ employee.phone }}" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" value="{{ employee.department }}" required>
                </div>
                <div class="form-group">
                    <label>Salary</label>
                    <input type="number" name="salary" value="{{ employee.salary }}" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Joining Date</label>
                    <input type="date" name="joining_date" value="{{ employee.joining_date }}" required>
                </div>
                <div class="form-group">
                    <label>Photo</label>
                    <input type="file" name="photo" accept="image/*">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a href="{% url 'employee_list' %}" class="btn btn-light">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
