{% extends 'employees/base.html' %}
{% block page_title %}Delete Employee{% endblock %}

{% block content %}
<div class="delete-box">
    <div class="card">
        <div class="card-body">
            <div class="delete-icon">⚠️</div>
            <h5 style="font-size:17px;font-weight:700;margin-bottom:10px;">Delete Employee?</h5>
            <p style="color:#888;font-size:14px;margin-bottom:24px;">
                <strong style="color:#333;">{{ employee.name }}</strong> ({{ employee.Emp_id }}) 
            </p>
            <form method="POST">
                {% csrf_token %}
                <div style="display:flex;gap:10px;justify-content:center;">
                    <button type="submit" class="btn btn-danger">🗑️ Delete</button>
                    <a href="{% url 'employee_list' %}" class="btn btn-light">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
