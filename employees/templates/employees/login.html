<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CompanyMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #0020647a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(127,119,221,0.15) 0%, transparent 70%);
            top: -100px; left: -100px;
            pointer-events: none;
        }
        .bg-glow2 {
            position: fixed;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(29,158,117,0.1) 0%, transparent 70%);
            bottom: -80px; right: -80px;
            pointer-events: none;
        }
        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #7f77dd, #5d55bb);
            border-radius: 18px;
            display: flex; align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 14px;
            box-shadow: 0 8px 24px rgba(127,119,221,0.3);
        }
        .brand h1 {
            font-size: 26px; font-weight: 700;
            color: #e2dff8; letter-spacing: -0.5px;
        }
        .brand p {
            font-size: 13px; color: #6b6480;
            margin-top: 5px;
        }
        .card {
            background: #1c1828;
            border-radius: 20px;
            border: 1px solid #2d2640;
            padding: 34px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card-title {
            font-size: 16px; font-weight: 600;
            color: #e2dff8; margin-bottom: 24px;
            text-align: center;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 11px; font-weight: 600;
            color: #4a4268;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute;
            left: 13px; top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: #3d3654;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px 11px 38px;
            border: 1.5px solid #2d2640;
            border-radius: 10px;
            font-size: 14px;
            color: #e2dff8;
            background: #211d2e;
            outline: none;
            transition: all 0.2s;
            font-family: "Segoe UI", sans-serif;
        }
        .form-group input:focus {
            border-color: #7f77dd;
            background: #261f38;
            box-shadow: 0 0 0 3px rgba(127,119,221,0.12);
        }
        .form-group input::placeholder { color: #3d3654; }
        .error-box {
            background: #2e1212;
            border: 1px solid #4a2020;
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 13px;
            color: #f08080;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7f77dd, #6b63c9);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s;
            font-family: "Segoe UI", sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 15px rgba(127,119,221,0.3);
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #6b63c9, #5a52b8);
            box-shadow: 0 6px 20px rgba(127,119,221,0.4);
            transform: translateY(-1px);
        }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #3d3654;
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="login-wrap">
    <div class="brand">
        <div class="brand-icon">🏢</div>
        <h1>CompanyMS</h1>
        <p>Company Management System</p>
    </div>
    <div class="card">
        <div class="card-title">Sign in to your account</div>
        {% if form.errors %}
        <div class="error-box">
            ❌ Username or password incorrect. Please try again!
        </div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" name="username" placeholder="Enter your username" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">🔐 Login</button>
        </form>
    </div>
    <div class="footer-text">CompanyMS © 2026 — All rights reserved</div>
</div>
</body>
</html>
