<!DOCTYPE html>
<html>
<head>
    <title>Delete Department</title>

    <style>

        body{
            background:#f4f6fb;
            font-family:'Segoe UI',sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            width:420px;
            padding:35px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        .icon{
            width:90px;
            height:90px;
            margin:auto;
            border-radius:50%;
            background:#fff3cd;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:40px;
        }

        h2{
            margin-top:20px;
            color:#1f2937;
        }

        p{
            margin-top:10px;
            color:#6b7280;
            line-height:1.6;
        }

        .btn-group{
            margin-top:25px;
        }

        .delete-btn{
            background:#ef4444;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            cursor:pointer;
            font-size:15px;
            margin-right:10px;
        }

        .cancel-btn{
            background:#e5e7eb;
            color:#374151;
            text-decoration:none;
            padding:12px 20px;
            border-radius:10px;
        }

    </style>
</head>
<body>

<div class="card">

    <div class="icon">
        ⚠️
    </div>

    <h2>Delete Department?</h2>

    <p>
        <strong>{{ department.dept_name }}</strong>
        ({{ department.dept_id }}) ah delete pannuviya?
        <br>
        Itha undo panna mudiyadhu!
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="btn-group">

            <button type="submit" class="delete-btn">
                🗑 Delete
            </button>

            <a href="{% url 'department_list' %}"
               class="cancel-btn">
                Cancel
            </a>

        </div>

    </form>

</div>

</body>
</html>
