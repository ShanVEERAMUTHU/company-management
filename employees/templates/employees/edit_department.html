<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Department</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6fb;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:700px;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.header{
    background:linear-gradient(135deg,#4f46e5,#6366f1);
    color:white;
    padding:25px;
}

.header h2{
    font-size:28px;
}

.header p{
    opacity:.9;
    margin-top:5px;
}

.form-body{
    padding:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#4f46e5;
    box-shadow:0 0 0 4px rgba(79,70,229,.15);
}

.readonly{
    background:#f3f4f6;
    cursor:not-allowed;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.update-btn{
    flex:1;
    background:#4f46e5;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

.update-btn:hover{
    background:#4338ca;
}

.cancel-btn{
    flex:1;
    text-decoration:none;
    text-align:center;
    padding:14px;
    border-radius:10px;
    background:#e5e7eb;
    color:#111827;
    font-weight:600;
}

.cancel-btn:hover{
    background:#d1d5db;
}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="header">
            <h2>✏️ Edit Department</h2>
            <p>Update department information</p>
        </div>

        <div class="form-body">

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">
                    <label>Department ID</label>
                    <input type="text"
                           value="{{ department.dept_id }}"
                           class="readonly"
                           readonly>
                </div>

                <div class="form-group">
                    <label>Department Name</label>
                    <input type="text"
                           name="dept_name"
                           value="{{ department.dept_name }}"
                           required>
                </div>

                <div class="form-group">
                    <label>Manager Name</label>
                    <input type="text"
                           name="manager_name"
                           value="{{ department.manager_name }}"
                           required>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text"
                           name="location"
                           value="{{ department.location }}"
                           required>
                </div>

                <div class="button-group">

                    <button type="submit" class="update-btn">
                        💾 Update Department
                    </button>

                    <a href="{% url 'department_list' %}"
                       class="cancel-btn">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
